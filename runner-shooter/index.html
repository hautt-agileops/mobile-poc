<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <link rel="icon" href="data:," />
  <title>Frontline Runner — prototype</title>
  <style>
    :root { color-scheme: dark; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; background: #0d1017; font-family: system-ui, sans-serif; }
    #game { position: fixed; inset: 0; width: 100%; height: 100%; display: block; touch-action: none; }

    #hud { position: fixed; top: env(safe-area-inset-top, 12px); left: 0; right: 0;
           display: flex; gap: 14px; justify-content: center; align-items: center;
           padding: 10px; pointer-events: none; text-shadow: 0 2px 6px #000; }
    #hud .pill { background: rgba(20,26,36,.7); border: 1px solid #26324a; border-radius: 999px;
                 padding: 6px 14px; font-weight: 700; font-size: 18px; letter-spacing: .3px; }
    #count { color: #7ec8ff; }
    #level { color: #cbd5e6; font-weight: 700; font-size: 14px; }
    #progbar { position: fixed; top: calc(env(safe-area-inset-top, 12px) + 56px); left: 12%; right: 12%;
               height: 5px; background: rgba(30,40,56,.7); border-radius: 3px; overflow: hidden; pointer-events: none; }
    #prog-fill { height: 100%; width: 0%; background: #4da3ff; transition: width .15s linear; }
    #diag { position: fixed; bottom: env(safe-area-inset-bottom, 8px); left: 10px; font-size: 12px;
            color: #58657c; pointer-events: none; }
    #hint { position: fixed; bottom: env(safe-area-inset-bottom, 8px); right: 10px; font-size: 12px;
            color: #58657c; pointer-events: none; }

    #flash { position: fixed; top: 38%; left: 0; right: 0; text-align: center; font-size: 30px;
             font-weight: 800; opacity: 0; transition: opacity .2s; pointer-events: none;
             text-shadow: 0 2px 10px #000; }

    .overlay { position: fixed; inset: 0; display: none; flex-direction: column; gap: 18px;
               align-items: center; justify-content: center; background: rgba(8,10,14,.8);
               backdrop-filter: blur(3px); text-align: center; padding: 20px; }
    .overlay h1 { font-size: 34px; color: #ff9a94; }
    .overlay p { color: #cbd5e6; max-width: 320px; }
    .btn { pointer-events: auto; background: #4da3ff; color: #06121f; border: 0; border-radius: 12px;
           font-weight: 800; font-size: 18px; padding: 12px 26px; cursor: pointer; }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
      "lil-gui": "https://unpkg.com/lil-gui@0.19.2/dist/lil-gui.esm.js"
    }
  }
  </script>
</head>
<body>
  <canvas id="game"></canvas>

  <div id="hud">
    <span class="pill">🪖 <b id="count">0</b></span>
    <span class="pill" id="dist">0 m</span>
    <span class="pill" id="level">Lv1</span>
  </div>
  <div id="progbar"><div id="prog-fill"></div></div>
  <div id="flash"></div>
  <div id="diag">booting…</div>
  <div id="hint">drag to steer · shoot gates ×/+ · pop barrels · beat the boss</div>

  <div id="over" class="overlay">
    <h1>Squad wiped</h1>
    <p id="over-text"></p>
    <button class="btn" id="restart">Run again</button>
  </div>

  <div id="levelup" class="overlay">
    <h1 style="color:#8dffb0">Level Complete</h1>
    <p id="levelup-text"></p>
    <button class="btn" id="next">Next level ▶</button>
  </div>

  <div id="win" class="overlay">
    <h1 style="color:#ffe14d">Victory 🏆</h1>
    <p id="win-text"></p>
    <button class="btn" id="win-restart">Play again</button>
  </div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
